services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geoinspection_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - geoinspection_pgdata:/var/lib/postgresql/data

volumes:
  geoinspection_pgdata: